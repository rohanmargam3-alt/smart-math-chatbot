<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧮 Math Solver Bot</title>

<link rel="stylesheet" href="style.css">

<!-- Math.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.min.js"></script>
</head>

<body>

<div class="container">
    <h1>🧮 Math Solver Bot</h1>

    <div id="chat" class="chat">
        <div class="msg bot">
            Hi! Try:<br>
            2+2<br>
            solve x+3=7<br>
            solve 2x+4=10<br>
            derivative(x^2)
        </div>
    </div>

    <div class="input-box">
        <input id="input" placeholder="Type a math problem...">
        <button onclick="send()">Send</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
